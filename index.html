<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Nicolas Lamb">
    <meta name="description" content="Jogue o jogo da cobrinha">
    <link rel="stylesheet" href="style.css">
    <title>Jogo da cobrinha</title>
</head>
<body>
    <div id="inicio">
        <h1 >WormGame</h1>
        <h2>Como jogar:</h2>
        <p>Pegue as comidas sem bater nas paredes ou em sua minhoca!</p>
        <pre>
            &larr;: mover para esquerda
            &uarr;: mover para cima
            &rarr;: mover para a direita
            &darr;: mover para baixo
        </pre>
        <button onclick="comecar()" id="play">Começar</button>
    </div>

    <div id="jogo">
        <p id="frutas">0 frutas coletadas</p>
        <canvas width="500" height="500"></canvas>
    </div>
    <div id="gameOver">
        <h2>VOCÊ PERDEU!</h2>
        <p>SEU RECORDE É</p>
        <p id="numero">0</p>
        <button onclick="recomecar()" id="recomecar">Jogar novamente</button>
        <button onclick="home()" id="home">Ir para a tela inicial</button>
    </div>
    <script src="script.js"> </script>
</body>
</html>
